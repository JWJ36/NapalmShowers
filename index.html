<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NapalmShowers .">
    <title>NapalmShowers | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        /* reset */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* colours */
        :root {
            --bg: #0a2e03;
            --accent: #ce6464;
            --text: #e8e8e8;
            --text-muted: #ce6464;
            --border: #10475c;
        }

        /* body */
        body {
            font-family: 'IBM Plex Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            cursor: crosshair;
        }

        /* links */
        a {
            cursor: crosshair;
        }

        /* nav */
        nav {
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            color: var(--accent);
            letter-spacing: 0.05em;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        /* hero */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2rem, 15vw, 12rem);
            color: var(--accent);
            letter-spacing: 0.03em;
            line-height: 1;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* starfield */
        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            cursor: crosshair;
        }

        /* boston */
        #boston {
            position: fixed;
            bottom: -300px;
            left: 0;
            width: 200px;
            pointer-events: none;
            z-index: 100;
        }

        /* mobile */
        @media (max-width: 600px) {
            nav {
                padding: 0.75rem 1rem;
            }

            .nav-links {
                gap: 0.75rem;
            }

            .nav-links a {
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>

    <!-- nav -->
    <nav>
        <a href="index.html" class="site-title">bingus</a>
        <ul class="nav-links">
            <li><a href="blog.html">Blog</a></li>
            <li><a href="breakingnews.html">Breaking News</a></li>
        </ul>
    </nav>

    <!-- hero -->
    <main>
        <canvas id="starfield"></canvas>
        <h1>NapalmShowers</h1>
    </main>

    <!-- footer -->
    <footer id="footer">
        napalmshowers
    </footer>

    <!-- boston -->
    <img id="boston" src="bostonterrier.png" alt="boston terrier">

    <!-- starfield script -->
    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const stars = Array.from({length: 180}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            z: Math.random() * canvas.width,
            size: Math.random() * 3.5 + 1.2
        }));

        const speed = 2;

        function draw() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            ctx.fillStyle = '#0a2e03';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(s => {
                s.z -= speed;
                if (s.z <= 0) {
                    s.x = Math.random() * canvas.width;
                    s.y = Math.random() * canvas.height;
                    s.z = canvas.width;
                }
                const px = (s.x - cx) * (canvas.width / s.z) + cx;
                const py = (s.y - cy) * (canvas.width / s.z) + cy;
                const r = s.size * (1 - s.z / canvas.width);
                const alpha = 1 - s.z / canvas.width;

                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(206, 100, 100, ${alpha})`;
                ctx.fill();
            });

            requestAnimationFrame(draw);
        }

        draw();
    </script>

    <!-- boston script -->
    <script>
        const boston = document.getElementById('boston');
        const footer = document.getElementById('footer');
        let dropTimer = null;

        function showBoston() {
            if (dropTimer) {
                clearTimeout(dropTimer);
                dropTimer = null;
            }

            const maxLeft = window.innerWidth - 200;
            const randomLeft = Math.floor(Math.random() * maxLeft);
            boston.style.left = randomLeft + 'px';
            boston.style.transition = 'bottom 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
            boston.style.bottom = '0px';

            dropTimer = setTimeout(() => {
                boston.style.transition = 'bottom 0.2s ease-in';
                boston.style.bottom = '-300px';
                dropTimer = null;
            }, 1500);
        }

        footer.addEventListener('click', showBoston);
    </script>

</body>

</html>
