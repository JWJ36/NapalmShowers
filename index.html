<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NapalmShowers .">
    <title>NapalmShowers | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        /* reset */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* colours */
        :root {
            --bg: #0a2e03;
            --accent: #ce6464;
            --text: #e8e8e8;
            --text-muted: #ce6464;
            --border: #10475c;
        }

        /* body */
        body {
            font-family: 'IBM Plex Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            cursor: crosshair;
        }

        /* links */
        a {
            cursor: crosshair;
        }

        /* nav */
        nav {
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            color: var(--accent);
            letter-spacing: 0.05em;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        /* hero */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 18vw, 12rem);
            color: var(--accent);
            letter-spacing: 0.03em;
            line-height: 1;
        }

        /* footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>

    <!-- nav -->
    <nav>
        <a href="index.html" class="site-title">bingus</a>
        <ul class="nav-links">
            <li><a href="blog.html">Blog</a></li>
            <li><a href="breakingnews.html">Breaking News</a></li>
        </ul>
    </nav>

    <!-- hero -->
    <main>
        <h1>NapalmShowers</h1>
    </main>

    <!-- footer -->
    <footer>
        napalmshowers
    </footer>

</body>

</html>
